<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リピカル｜リピートを、もっとかんたんに。</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F7FB; --surface:#FFFFFF; --surface-2:#FAFAFD;
    --ink:#1D1B2E; --ink-2:#5B5970; --ink-3:#9E9CB0;
    --line:#ECEBF3; --line-2:#E1E0EB;
    --indigo:#4F46E5; --indigo-2:#6C63F5; --indigo-soft:#EDECFD; --indigo-softer:#F6F5FF; --indigo-line:#DBD9F8;
    --blue:#2563EB; --blue-soft:#E9F0FE;
    --amber:#F59E0B; --amber-ink:#B06A00; --amber-soft:#FDF1DC; --amber-line:#F6E2B8;
    --cream:#FFF9EE;
    --green:#12B389;
    --jp:"Noto Sans JP",system-ui,sans-serif;
    --num:"Manrope","Noto Sans JP",sans-serif;
    --sh:0 1px 2px rgba(29,27,46,.04);
    --sh-md:0 1px 3px rgba(29,27,46,.04),0 10px 26px -14px rgba(29,27,46,.1);
    --sh-lg:0 28px 70px -20px rgba(29,27,46,.35);
    --r:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--jp);line-height:1.55;-webkit-font-smoothing:antialiased;font-size:13.5px}
  button{font-family:inherit;cursor:pointer;color:inherit}
  img{display:block}
  a{color:var(--indigo);text-decoration:none;font-weight:700;cursor:pointer}
  .num{font-family:var(--num);font-variant-numeric:tabular-nums;letter-spacing:-.02em}
  :focus-visible{outline:2.5px solid var(--indigo);outline-offset:2px;border-radius:8px}

  /* ===== top nav ===== */
  header{background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50}
  .topbar{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:26px;height:58px;padding:0 24px}
  .brand{display:flex;align-items:center;gap:9px;flex-shrink:0}
  .brand svg{width:26px;height:26px}
  .brand .nm{font-weight:900;font-size:16.5px;letter-spacing:.01em}
  nav{display:flex;gap:4px;height:100%}
  .nv{border:none;background:none;font-size:13.5px;font-weight:500;color:var(--ink-2);padding:0 14px;position:relative;height:100%;transition:color .14s}
  .nv:hover{color:var(--ink)}
  .nv.on{color:var(--indigo);font-weight:700}
  .nv.on::after{content:"";position:absolute;left:12px;right:12px;bottom:-1px;height:2.5px;border-radius:3px;background:var(--indigo)}
  .nv .bdg{position:absolute;top:9px;right:2px;min-width:16px;height:16px;border-radius:8px;background:var(--amber);color:#fff;font-size:10px;font-weight:800;font-family:var(--num);display:flex;align-items:center;justify-content:center;padding:0 4px}
  .top-right{margin-left:auto;display:flex;align-items:center;gap:16px}
  .bell{position:relative;width:34px;height:34px;border:none;background:none;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--ink-2)}
  .bell:hover{background:var(--surface-2)}
  .bell svg{width:18px;height:18px}
  .bell .dot{position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--amber);border:1.5px solid var(--surface)}
  .me{display:flex;align-items:center;gap:9px}
  .me .av{width:32px;height:32px}
  .me .who .n{font-size:12.5px;font-weight:700;line-height:1.2}
  .me .who .r{font-size:10.5px;color:var(--ink-3)}

  .wrap{max-width:1200px;margin:0 auto;padding:24px 24px 64px}
  .pt{font-weight:900;font-size:19px;margin-bottom:16px}
  .crumb{font-size:12px;color:var(--ink-3);margin-bottom:12px}
  .crumb a{font-weight:500;color:var(--ink-3)}
  .crumb a:hover{color:var(--indigo)}
  .crumb b{color:var(--ink-2);font-weight:700}

  .btn{border:none;border-radius:10px;padding:9.5px 16px;font-weight:700;font-size:13px;background:var(--indigo);color:#fff;transition:filter .15s,transform .1s;display:inline-flex;align-items:center;gap:7px;box-shadow:0 2px 8px rgba(79,70,229,.3);white-space:nowrap}
  .btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn.ghost{background:var(--surface);color:var(--indigo);border:1px solid var(--indigo-line);box-shadow:var(--sh)}
  .btn.ghost:hover{background:var(--indigo-softer);filter:none;transform:none}
  .btn.amber{background:var(--surface);color:var(--amber-ink);border:1px solid var(--amber-line);box-shadow:var(--sh)}
  .btn.amber:hover{background:var(--amber-soft);filter:none;transform:none}
  .btn.gray{background:var(--surface-2);color:var(--ink-2);box-shadow:none;border:1px solid var(--line-2)}
  .btn.gray:hover{background:var(--line);filter:none;transform:none}
  .btn.sm{padding:7px 12px;font-size:12px;border-radius:9px}
  .btn.xs{padding:5.5px 11px;font-size:11.5px;border-radius:8px}
  .btn .ic{width:14px;height:14px}
  .btn[disabled]{opacity:.4;pointer-events:none}
  .kebab{width:30px;height:30px;border:none;background:none;border-radius:8px;color:var(--ink-3);font-weight:900;font-size:15px;line-height:1}
  .kebab:hover{background:var(--surface-2);color:var(--ink-2)}

  /* ===== stat cards ===== */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .scard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 17px;box-shadow:var(--sh-md);display:flex;gap:13px;align-items:flex-start}
  .scard .sic{width:38px;height:38px;border-radius:11px;background:var(--indigo-soft);color:var(--indigo);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
  .scard .sic svg{width:18px;height:18px}
  .scard.warn .sic{background:var(--amber-soft);color:var(--amber)}
  .scard .k{font-size:11.5px;color:var(--ink-2);font-weight:500}
  .scard .v{font-family:var(--num);font-weight:800;font-size:24px;letter-spacing:-.02em;line-height:1.2}
  .scard .v small{font-family:var(--jp);font-size:12px;font-weight:700;color:var(--ink-3);margin-left:1px;letter-spacing:0}
  .scard .dl{font-size:11px;font-weight:700;margin-top:1px;color:var(--indigo)}
  .scard .dl.up{color:var(--green)}
  .scard.warn .dl{color:var(--amber-ink)}
  .scard .spark{margin-left:auto;align-self:center}

  /* ===== layout: main + rail ===== */
  .cols{display:grid;grid-template-columns:1fr 296px;gap:16px;align-items:start}
  .toolrow{display:flex;gap:10px;margin-bottom:12px;align-items:center}
  .search{position:relative;width:280px}
  .search input{width:100%;border:1px solid var(--line-2);border-radius:10px;padding:9.5px 13px 9.5px 36px;font-family:inherit;font-size:13px;background:var(--surface);box-shadow:var(--sh)}
  .search input:focus{outline:none;border-color:var(--indigo);box-shadow:0 0 0 4px var(--indigo-soft)}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-3);width:15px;height:15px}
  .sel{position:relative}
  .sel select{appearance:none;border:1px solid var(--line-2);border-radius:10px;padding:9.5px 32px 9.5px 13px;font-family:inherit;font-size:12.5px;font-weight:500;background:var(--surface);color:var(--ink);box-shadow:var(--sh);cursor:pointer}
  .sel select:focus{outline:none;border-color:var(--indigo)}
  .sel::after{content:"";position:absolute;right:13px;top:50%;width:6.5px;height:6.5px;border-right:1.8px solid var(--ink-3);border-bottom:1.8px solid var(--ink-3);transform:translateY(-68%) rotate(45deg);pointer-events:none}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-md);overflow:hidden}
  .thead,.row{display:grid;grid-template-columns:1.45fr 1.5fr 1fr .95fr 1fr 34px;align-items:center;gap:10px;padding:0 16px}
  .thead{height:40px;border-bottom:1px solid var(--line);font-size:11px;font-weight:700;color:var(--ink-3)}
  .row{width:100%;border:none;background:none;text-align:left;min-height:60px;border-bottom:1px solid var(--line);transition:background .12s}
  .row:last-child{border-bottom:none}
  .row:hover{background:var(--surface-2)}
  .row.due{background:var(--cream)}
  .row.due:hover{background:#FFF4DF}
  .cname{display:flex;align-items:center;gap:11px;min-width:0}
  .av{width:36px;height:36px;border-radius:50%;flex-shrink:0;object-fit:cover}
  .cname .nm{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cname .kn{font-size:10.5px;color:var(--ink-3);letter-spacing:.03em}
  .cmenu{font-size:12.5px;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cdate .d{font-size:12.5px}
  .cdate .a{display:block;font-size:10.5px;color:var(--ink-3)}
  .cnote{font-size:12px;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pill{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:4px 11px;border-radius:999px;white-space:nowrap}
  .pill.ok{background:var(--blue-soft);color:var(--blue)}
  .pill.due{background:var(--amber-soft);color:var(--amber-ink)}
  .pill.none{background:var(--surface-2);color:var(--ink-3);border:1px solid var(--line)}
  .tfoot{display:flex;justify-content:center;padding:11px;border-top:1px solid var(--line);font-size:12px;color:var(--ink-2);font-weight:500}

  /* ===== rail ===== */
  .rail{display:flex;flex-direction:column;gap:14px}
  .rcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-md);padding:16px 17px}
  .rh{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
  .rh .t{font-weight:900;font-size:13.5px}
  .rh a{font-size:11.5px}
  .top5{display:flex;flex-direction:column}
  .t5{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
  .t5:last-child{border-bottom:none;padding-bottom:2px}
  .t5 .rk{font-family:var(--num);font-weight:800;font-size:12px;color:var(--ink-3);width:12px;text-align:center;flex-shrink:0}
  .t5 .av{width:32px;height:32px}
  .t5 .nm{font-size:12.5px;font-weight:700;line-height:1.3}
  .t5 .nm .sama{font-weight:500;font-size:10.5px;color:var(--ink-3);margin-left:2px}
  .t5 .lv{font-size:10.5px;color:var(--ink-3)}
  .t5 .wk{margin-left:auto;flex-shrink:0;font-size:10.5px;font-weight:700;color:var(--amber-ink);background:var(--amber-soft);padding:3px 8px;border-radius:999px}
  .promo{background:linear-gradient(160deg,var(--indigo-softer),var(--indigo-soft));border:1px solid var(--indigo-line);border-radius:var(--r);padding:16px 17px;display:flex;gap:12px;align-items:flex-start}
  .promo .pic{width:36px;height:36px;border-radius:11px;background:var(--surface);color:var(--indigo);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--sh)}
  .promo .pic svg{width:17px;height:17px}
  .promo .t{font-weight:900;font-size:13px}
  .promo .s{font-size:11.5px;color:var(--ink-2);margin:3px 0 10px;line-height:1.6}

  .empty{text-align:center;padding:54px 20px;color:var(--ink-3)}
  .empty .eic{width:52px;height:52px;border-radius:16px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
  .empty .eic svg{width:24px;height:24px;color:var(--ink-3)}
  .empty .big{font-weight:700;font-size:14px;color:var(--ink-2);margin-bottom:3px}

  /* ===== detail ===== */
  .dhead{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-md);padding:16px 20px;margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .dhead .av{width:52px;height:52px}
  .dhead h2{font-weight:900;font-size:18px}
  .dhead h2 .sama{font-weight:500;font-size:12px;color:var(--ink-3);margin-left:3px}
  .dhead .kn{font-size:11px;color:var(--ink-3);letter-spacing:.04em}
  .dtags{display:flex;gap:6px;margin-left:4px}
  .dtag{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;background:var(--surface-2);border:1px solid var(--line-2);color:var(--ink-2)}
  .dtag.vip{background:var(--indigo-soft);border-color:var(--indigo-line);color:var(--indigo)}
  .dcontact{display:flex;gap:18px;align-items:center;margin-left:18px;font-size:12.5px;color:var(--ink-2);flex-wrap:wrap}
  .dcontact span{display:inline-flex;align-items:center;gap:6px}
  .dcontact svg{width:14px;height:14px;color:var(--ink-3)}
  .dcontact .line-ic{color:#06C755}
  .dhead .acts{margin-left:auto;display:flex;gap:8px;align-items:center}

  .dcols{display:grid;grid-template-columns:1fr 280px;gap:16px;align-items:start}
  .kart{background:var(--cream);border:1px solid var(--amber-line);border-radius:var(--r);padding:18px 20px;margin-bottom:14px}
  .kart .kh{font-size:11.5px;font-weight:700;color:var(--amber-ink);margin-bottom:8px}
  .kart .km{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .kart .km .m{font-weight:900;font-size:17px}
  .kart .wk{font-size:11px;font-weight:700;color:var(--amber-ink);background:#fff;border:1px solid var(--amber-line);padding:3px 10px;border-radius:999px}
  .kart .memo{font-size:13px;line-height:1.85;color:var(--ink);margin-top:10px;white-space:pre-wrap}
  .kart-grid{display:grid;grid-template-columns:1fr 190px;gap:22px}
  .kart .side{border-left:1px solid var(--amber-line);padding-left:20px;display:flex;flex-direction:column;gap:12px}
  .kart .side .l{font-size:10.5px;color:var(--ink-3);font-weight:700}
  .kart .staff{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;margin-top:3px}
  .kart .staff .av{width:26px;height:26px}
  .kart .price{font-family:var(--num);font-weight:800;font-size:20px;letter-spacing:-.02em;margin-top:2px}

  .sectitle{font-weight:900;font-size:13.5px;margin:2px 0 10px}
  .htable{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-md);overflow:hidden}
  .hrow{display:grid;grid-template-columns:110px 1.6fr .7fr .9fr;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);font-size:12.5px}
  .hrow:last-child{border-bottom:none}
  .hrow:hover{background:var(--surface-2)}
  .dchip{font-family:var(--num);font-weight:800;font-size:11.5px;color:var(--indigo);background:var(--indigo-softer);border:1px solid var(--indigo-line);padding:4px 9px;border-radius:8px;text-align:center}
  .hrow .hm{font-weight:700}
  .hrow .hp{font-family:var(--num);font-weight:800;text-align:right}
  .hrow .hs{color:var(--ink-2);display:inline-flex;align-items:center;gap:6px;justify-self:end}
  .hrow .hs svg{width:12px;height:12px;color:var(--ink-3)}

  .memolist{list-style:none;display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:var(--ink)}
  .memolist li{display:flex;gap:8px;line-height:1.6}
  .memolist li::before{content:"・";color:var(--ink-3);flex-shrink:0}
  .nextline{font-size:12.5px;color:var(--ink-3);padding:6px 0 2px}
  .next-appt{display:flex;gap:11px;align-items:center;padding:4px 0 2px}
  .next-appt .tm{font-family:var(--num);font-weight:800;font-size:12.5px;color:var(--indigo)}
  .next-appt .m{font-size:12.5px;font-weight:700}
  .next-appt .d{font-size:10.5px;color:var(--ink-3)}

  /* ===== rebook / calendar / messages / analytics(reuse tokens) ===== */
  .rlist{display:flex;flex-direction:column;gap:11px}
  .rrow{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px 18px;box-shadow:var(--sh-md);border-left:4px solid var(--amber)}
  .rrow .elapsed{text-align:center;flex-shrink:0;min-width:48px}
  .rrow .elapsed .n{font-family:var(--num);font-weight:800;font-size:26px;color:var(--amber-ink);line-height:1}
  .rrow .elapsed .u{font-size:9.5px;color:var(--ink-3);font-weight:700;margin-top:2px}
  .rrow .rsep{width:1px;align-self:stretch;background:var(--line)}
  .rrow .av{width:42px;height:42px}
  .rrow .nm{font-weight:700;font-size:14px}.rrow .nm .sama{font-weight:500;font-size:11px;color:var(--ink-3);margin-left:2px}
  .rrow .info{font-size:12px;color:var(--ink-2);margin-top:1px}
  .rrow .acts{margin-left:auto;display:flex;gap:8px;flex-shrink:0}

  .cal-wrap{display:grid;grid-template-columns:1fr 300px;gap:16px;align-items:start}
  .cal-main{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-md);padding:16px 18px}
  .cal-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .cal-head .mlabel{font-weight:900;font-size:15.5px}
  .cal-nav{display:flex;gap:6px;margin-left:auto}
  .cal-nav button{height:30px;min-width:30px;padding:0 11px;border-radius:9px;border:1px solid var(--line-2);background:var(--surface);color:var(--ink-2);font-size:12.5px;font-weight:700}
  .cal-nav button:hover{background:var(--surface-2)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal-dow{text-align:center;font-size:10.5px;font-weight:700;color:var(--ink-3);padding:4px 0}
  .cal-dow.sun{color:#F43F5E}.cal-dow.sat{color:var(--blue)}
  .cal-cell{min-height:78px;border:1px solid var(--line);border-radius:11px;padding:6px 7px;text-align:left;background:var(--surface);transition:border-color .12s,box-shadow .12s;display:flex;flex-direction:column;gap:3px}
  .cal-cell:hover{border-color:var(--indigo-line);box-shadow:var(--sh)}
  .cal-cell.we{background:var(--surface-2)}
  .cal-cell.empty{border:none;background:none;pointer-events:none}
  .cal-cell .dn{font-family:var(--num);font-size:11.5px;font-weight:800;color:var(--ink-2);width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%}
  .cal-cell.today .dn{color:#fff;background:var(--indigo)}
  .cal-cell.sel{border-color:var(--indigo);box-shadow:0 0 0 3px var(--indigo-soft)}
  .chip{font-size:9.5px;font-weight:700;color:var(--indigo);background:var(--indigo-soft);border-radius:6px;padding:2px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .chip .t{font-family:var(--num);font-weight:800;margin-right:2px}
  .cal-cell .more{font-size:9.5px;color:var(--ink-3);font-weight:700;padding-left:2px}
  .day-panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-md);padding:15px 17px}
  .day-panel .dph{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
  .day-panel .dpt{font-weight:900;font-size:13.5px}
  .day-panel .dcnt{font-size:11px;color:var(--ink-3);font-weight:700}
  .appt{display:flex;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}
  .appt:last-child{border-bottom:none}
  .appt .tm{font-family:var(--num);font-weight:800;font-size:12px;color:var(--indigo);width:42px;flex-shrink:0;padding-top:1px}
  .appt .bar{width:3px;border-radius:3px;background:var(--indigo-soft);flex-shrink:0}
  .appt .am{font-weight:700;font-size:12.5px}.appt .as{font-size:11px;color:var(--ink-2);margin-top:1px}

  .msg-wrap{display:grid;grid-template-columns:310px 1fr;gap:16px;align-items:start}
  .recips{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-md);overflow:hidden}
  .recips .rhh{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line);font-size:12px;font-weight:700;background:var(--surface-2)}
  .recip{display:flex;align-items:center;gap:11px;padding:10px 16px;border:none;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s;width:100%;text-align:left;background:none}
  .recip:last-child{border-bottom:none}

function av(name){
  if(PHOTOS[name])return PHOTOS[name];
  const[bg,fg]=AVPAL[hash(name)%AVPAL.length];
  const svg=`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'><rect width='80' height='80' fill='${bg}'/><circle cx='40' cy='32' r='15' fill='${fg}'/><path d='M13 72c0-16 13-25 27-25s27 9 27 25z' fill='${fg}'/></svg>`;
  return "data:image/svg+xml;utf8,"+encodeURIComponent(svg);}
const yen=n=>"¥"+(n||0).toLocaleString("ja-JP");

const lastVisit=c=>c.visits.slice().sort((a,b)=>b.date<a.date?-1:1)[0];
const daysSince=d=>Math.floor((Date.now()-new Date(d).getTime())/DAY);
const weeksAgo=days=>days<7?`${days}日前`:`${Math.floor(days/7)}週間前`;
const WD=["日","月","火","水","木","金","土"];
const fmtDate=d=>{const x=new Date(d);return `${x.getFullYear()}/${String(x.getMonth()+1).padStart(2,"0")}/${String(x.getDate()).padStart(2,"0")}`;};
function status(c){const lv=lastVisit(c);if(!lv)return{key:"none",label:"未来店",cls:"none"};
  const d=daysSince(lv.date);
  if(d>=REBOOK_DAYS&&!c.contactedAt)return{key:"due",label:"そろそろ再来店",cls:"due"};
  return{key:"ok",label:"順調",cls:"ok"};}
const dueList=()=>customers.filter(c=>status(c).key==="due").sort((a,b)=>daysSince(lastVisit(b).date)-daysSince(lastVisit(a).date));
const visitsInRange=(a,b)=>customers.reduce((n,c)=>n+c.visits.filter(v=>{const d=daysSince(v.date);return d>=a&&d<b;}).length,0);
function monthly(){const arr=[];const b=new Date();
  for(let i=5;i>=0;i--){const d=new Date(b.getFullYear(),b.getMonth()-i,1);let cnt=0,rev=0;
    customers.forEach(c=>c.visits.forEach(v=>{const vd=new Date(v.date);if(vd.getFullYear()===d.getFullYear()&&vd.getMonth()===d.getMonth()){cnt++;rev+=v.price||0;}}));
    arr.push({label:(d.getMonth()+1)+"月",count:cnt,rev});}return arr;}
function popular(){const m={};customers.forEach(c=>c.visits.forEach(v=>{m[v.menu]=(m[v.menu]||0)+1;}));
  return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,5);}
const repeatRate=()=>customers.length?Math.round(customers.filter(c=>c.visits.length>=2).length/customers.length*1000)/10:0;
function thisMonth(){const d=new Date();let visits=0,rev=0,neu=0;
  customers.forEach(c=>{c.visits.forEach(v=>{const vd=new Date(v.date);if(vd.getFullYear()===d.getFullYear()&&vd.getMonth()===d.getMonth()){visits++;rev+=v.price||0;}});
    const fv=new Date(c.firstVisit);if(fv.getFullYear()===d.getFullYear()&&fv.getMonth()===d.getMonth())neu++;});
  return{visits,rev,neu};}
const nextAppt=c=>appts.filter(a=>a.cust===c.name&&a.date>=iso(nowD())).sort((a,b)=>(a.date+a.time)<(b.date+b.time)?-1:1)[0];

function toast(msg){const t=$("#toast");t.innerHTML=CK+msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200);}
function sparkline(){
  const mo=monthly();const max=Math.max(...mo.map(x=>x.count),1);
  const pts=mo.map((x,i)=>`${8+i*16},${30-Math.round(x.count/max*22)}`).join(" ");
  return `<svg width="92" height="34" viewBox="0 0 92 34" fill="none"><polyline points="${pts}" stroke="#4F46E5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polygon points="8,32 ${pts} 88,32" fill="url(#g)" opacity=".18"/><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#4F46E5"/><stop offset="1" stop-color="#4F46E5" stop-opacity="0"/></linearGradient></defs></svg>`;}

function render(){
  $("#rebook-count").textContent=dueList().length;
  $("#me-av").src=av("サロンドリコ");
  document.querySelectorAll(".nv").forEach(n=>{
    const active=n.dataset.view===state.view||(state.view==="detail"&&n.dataset.view==="list")||(state.view==="messages"&&n.dataset.view==="rebook");
    n.classList.toggle("on",active);});
  const f={home:viewHome,list:viewList,detail:viewDetail,rebook:viewRebook,calendar:viewCalendar,messages:viewMessages,analytics:viewAnalytics}[state.view];
  $("#main").innerHTML=`<div class="view">${f()}</div>`;
  bind();
}

function statCards(){
  const wk=visitsInRange(0,7),pv=visitsInRange(7,14),d=wk-pv;const tm=thisMonth();
  return `<div class="stats">
    <div class="scard"><span class="sic">${I.users}</span><div><div class="k">顧客数</div><div class="v num">${customers.length}<small>人</small></div><div class="dl up">+${tm.neu} 今月</div></div></div>
    <div class="scard"><span class="sic">${I.cal}</span><div><div class="k">今週の来店数</div><div class="v num">${wk}<small>人</small></div><div class="dl ${d>=0?'up':''}">${d>=0?"+":""}${d} 先週比</div></div></div>
    <div class="scard warn"><span class="sic">${I.bellA}</span><div><div class="k">フォロー待ち</div><div class="v num">${dueList().length}<small>人</small></div><div class="dl">そろそろ再来店</div></div></div>
    <div class="scard"><div><div class="k">リピート率（直近）</div><div class="v num">${repeatRate()}<small>%</small></div><div class="dl up">2回以上ご来店</div></div><span class="spark">${sparkline()}</span></div>
  </div>`;}

function tableRows(limit){
  const q=state.query.trim().toLowerCase(),f=state.filter;
  let list=customers.filter(c=>!q||c.name.toLowerCase().includes(q)||c.kana.toLowerCase().includes(q)).filter(c=>f==="all"||status(c).key===f)
    .sort((a,b)=>{const sa=status(a).key==="due"?0:1,sb=status(b).key==="due"?0:1;if(sa!==sb)return sa-sb;return (lastVisit(b)?.date||"")<(lastVisit(a)?.date||"")?-1:1;});
  if(limit)list=list.slice(0,limit);
  if(!list.length)return `<div class="empty"><div class="eic">${I.users}</div><div class="big">該当するお客様がいません</div>検索や状態を変えてみてください</div>`;
  return list.map(c=>{const lv=lastVisit(c),st=status(c);const ds=lv?daysSince(lv.date):null;
    return `<button class="row ${st.key==='due'?'due':''}" data-id="${c.id}">
      <span class="cname"><img class="av" src="${av(c.name)}" alt=""><span style="min-width:0"><span class="nm">${c.name}</span><div class="kn">${c.kana}</div></span></span>
      <span class="cmenu">${lv?lv.menu:"—"}</span>
      <span class="cdate"><span class="d num">${lv?fmtDate(lv.date):"—"}</span><span class="a">${lv?"（"+weeksAgo(ds)+"）":""}</span></span>
      <span class="cstat"><span class="pill ${st.cls}">${st.label}</span></span>
      <span class="cnote">${c.note||""}</span>
      <span class="kebab">⋮</span></button>`;}).join("");}
function toolrow(withAdd){
  return `<div class="toolrow"><div class="search">${mag()}<input id="q" placeholder="お客様名・カナで検索" value="${state.query}"></div>
    <div class="sel"><select id="filter"><option value="all">すべての状態</option><option value="due">そろそろ再来店</option><option value="ok">順調</option></select></div>
    ${withAdd?`<span style="flex:1"></span><button class="btn" id="add-cust">${plus()}顧客を追加</button>`:""}</div>`;}
function tableHead(){return `<div class="thead"><span>お客様名</span><span>前回のメニュー</span><span>最終来店日</span><span>状態</span><span>メモ</span><span></span></div>`;}

function railTop5(){
  const list=dueList().slice(0,5);
  const rows=list.map((c,i)=>{const lv=lastVisit(c),ds=daysSince(lv.date);
    return `<div class="t5"><span class="rk">${i+1}</span><img class="av" src="${av(c.name)}" alt="">
      <span style="min-width:0"><span class="nm">${c.name}<span class="sama">様</span></span><div class="lv">最終来店日 <span class="num">${fmtDate(lv.date)}</span></div></span>
      <span class="wk">${Math.floor(ds/7)}週間前</span></div>`;}).join("");
  return `<div class="rcard"><div class="rh"><span class="t">フォロー待ちTOP5</span><a data-goto="rebook">すべて見る</a></div>
    <div class="top5">${rows||`<div style="font-size:12px;color:var(--ink-3);padding:8px 0">フォロー待ちはいません</div>`}</div></div>`;}
function railPromo(){
  return `<div class="promo"><span class="pic">${I.plane}</span><div>
    <div class="t">フォローメッセージを送ろう</div><div class="s">LINEやSMSで簡単にご案内できます</div>
    <button class="btn ghost xs" data-goto="messages">メッセージを作成</button></div></div>`;}

function viewHome(){
  return `<div class="pt">ホーム</div>${statCards()}
    <div class="cols"><div>${toolrow(true)}<div class="panel">${tableHead()}${tableRows(6)}
      <button class="tfoot" data-goto="list" style="width:100%;background:none;border:none;cursor:pointer">全 ${customers.length}件を表示 ⌄</button></div></div>
    <div class="rail">${railTop5()}${railPromo()}</div></div>`;}

function viewList(){
  return `<div class="pt">顧客一覧</div>${toolrow(true)}
    <div class="panel">${tableHead()}${tableRows()}</div>`;}

function viewDetail(){
  const c=customers.find(x=>x.id===state.selectedId);
  const visits=c.visits.slice().sort((a,b)=>b.date<a.date?-1:1);const lv=visits[0];const st=status(c);
  const na=nextAppt(c);
  const kart=lv?`<div class="kart"><div class="kh">前回の施術（${fmtDate(lv.date)}）</div>
    <div class="kart-grid"><div>
      <div class="km"><span class="m">${lv.menu}</span>${st.key==="due"?`<span class="wk">${Math.floor(daysSince(lv.date)/7)}週間前</span>`:""}</div>
      <div class="memo">${lv.memo?("申し送りメモ\n"+lv.memo):"（申し送りはありません）"}</div>
    </div><div class="side">
      <div><div class="l">担当者</div><div class="staff"><img class="av" src="${av(lv.staff||"担当")}" alt="">${lv.staff||"—"}</div></div>
      <div><div class="l">金額</div><div class="price">${yen(lv.price)}</div></div>
    </div></div></div>`
    :`<div class="kart"><div class="kh">前回の施術</div><div style="color:var(--ink-3);font-size:13px">まだ来店記録がありません。「来店を記録」から追加できます。</div></div>`;
  const hist=visits.map(v=>`<div class="hrow"><span class="dchip">${fmtDate(v.date)}</span><span class="hm">${v.menu}</span><span class="hp">${yen(v.price)}</span><span class="hs">${I.pin}${v.staff||"—"}</span></div>`).join("");
  const memos=(c.memos||[]).map(m=>`<li>${m}</li>`).join("");
  return `<div class="crumb"><a data-goto="list">顧客一覧</a> › <b>顧客詳細</b></div>
    <div class="dhead"><img class="av" src="${av(c.name)}" alt="">
      <div><h2>${c.name}<span class="sama">様</span></h2><div class="kn">${c.kana}</div></div>
      <div class="dtags"><span class="dtag">${c.age||""}</span>${c.visits.length>=4?`<span class="dtag vip">常連（来店${c.visits.length}回）</span>`:`<span class="dtag">来店${c.visits.length}回</span>`}</div>
      <div class="dcontact"><span>${I.phone}<span class="num">${c.phone||"—"}</span></span><span><span class="line-ic" style="width:15px;height:15px;display:inline-flex">${I.line}</span>${c.line||"—"}</span><span>${I.memo}メモあり</span></div>
      <div class="acts"><button class="btn" id="add-visit">${I.clock}来店を記録</button><button class="kebab">⋮</button></div></div>
    <div class="dcols"><div>
      ${kart}
      <div class="sectitle">来店履歴</div>
      <div class="htable">${hist||`<div class="empty" style="padding:36px">記録はまだありません</div>`}</div>
    </div>
    <div class="rail">
      <div class="rcard"><div class="rh"><span class="t">お客様メモ</span></div>
        <ul class="memolist">${memos||`<li style="color:var(--ink-3)">メモはまだありません</li>`}</ul>
        <button class="btn gray sm" id="add-memo" style="width:100%;justify-content:center;margin-top:12px">${plus()}メモを追加</button></div>
      <div class="rcard"><div class="rh"><span class="t">次回の予定</span><a id="add-appt-c">予定を追加</a></div>
        ${na?`<div class="next-appt"><span class="tm">${na.time}</span><div><div class="m">${na.menu}</div><div class="d num">${fmtDate(na.date)}（${WD[new Date(na.date).getDay()]}）</div></div></div>`:`<div class="nextline">予定はありません</div>`}</div>
    </div></div>`;}

function viewRebook(){const list=dueList();
  const rows=list.map(c=>{const lv=lastVisit(c),ds=daysSince(lv.date);
    return `<div class="rrow"><div class="elapsed"><div class="n">${ds}</div><div class="u">日経過</div></div><div class="rsep"></div>
      <img class="av" src="${av(c.name)}" alt="">
      <div style="min-width:0"><div class="nm">${c.name}<span class="sama">様</span></div><div class="info">最終来店 <b class="num">${fmtDate(lv.date)}</b>・${lv.menu}</div></div>
      <div class="acts"><button class="btn ghost sm" data-open="${c.id}">カルテ</button><button class="btn amber sm" data-done="${c.id}">連絡済みにする</button></div></div>`;}).join("");
  return `<div class="pt" style="display:flex;align-items:center;gap:14px">再来店フォロー<span style="flex:1"></span>${list.length?`<button class="btn" data-goto="messages">${I.chat}まとめて連絡</button>`:""}</div>
    <div style="font-size:12.5px;color:var(--ink-2);margin:-8px 0 14px">前回から一定期間あいたお客様です。経過が長い順に表示しています</div>
    <div class="rlist">${rows||`<div class="empty"><div class="eic">${I.clock}</div><div class="big">フォロー待ちはいません</div>みなさん最近ご来店です</div>`}</div>`;}

function viewCalendar(){
  const y=state.calY,m=state.calM;const first=new Date(y,m,1);const sw=first.getDay();const dim=new Date(y,m+1,0).getDate();
  const cells=[];for(let i=0;i<sw;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(new Date(y,m,d));while(cells.length%7)cells.push(null);
  const todayIso=iso(nowD());
  const dow=WD.map((w,i)=>`<div class="cal-dow ${i===0?'sun':i===6?'sat':''}">${w}</div>`).join("");
  const grid=cells.map((dt,idx)=>{if(!dt)return `<div class="cal-cell empty"></div>`;
    const di=iso(dt);const list=appts.filter(a=>a.date===di).sort((a,b)=>a.time<b.time?-1:1);
    const wd=idx%7;const chips=list.slice(0,2).map(a=>`<span class="chip"><span class="t">${a.time}</span>${a.cust}</span>`).join("");
    return `<button class="cal-cell ${di===todayIso?'today':''} ${di===state.calSel?'sel':''} ${wd===0||wd===6?'we':''}" data-day="${di}">
      <span class="dn">${dt.getDate()}</span>${chips}${list.length>2?`<span class="more">ほか${list.length-2}件</span>`:""}</button>`;}).join("");
  const sel=new Date(state.calSel);
  const day=appts.filter(a=>a.date===state.calSel).sort((a,b)=>a.time<b.time?-1:1);
  const dayHtml=day.length?day.map(a=>`<div class="appt"><span class="tm">${a.time}</span><span class="bar"></span><div><div class="am">${a.cust} 様</div><div class="as">${a.menu}</div></div></div>`).join("")
    :`<div class="empty" style="padding:28px 8px"><div class="eic" style="width:40px;height:40px">${I.cal}</div><div class="big" style="font-size:12.5px">予約はありません</div></div>`;
  return `<div class="pt" style="display:flex;align-items:center">カレンダー<span style="flex:1"></span><button class="btn" id="add-appt">${plus()}予約を追加</button></div>
    <div class="cal-wrap"><div class="cal-main">
      <div class="cal-head"><span class="mlabel"><span class="num">${y}</span>年 <span class="num">${m+1}</span>月</span><div class="cal-nav"><button data-mv="-1">‹</button><button data-mv="today">今日</button><button data-mv="1">›</button></div></div>
      <div class="cal-grid">${dow}${grid}</div></div>
      <div class="day-panel"><div class="dph"><span class="dpt"><span class="num">${fmtDate(state.calSel)}</span>（${WD[sel.getDay()]}）</span><span class="dcnt num">${day.length}件</span></div>${dayHtml}</div>
    </div>`;}

function viewMessages(){
  const due=dueList();
  if(state.msgSel===null)state.msgSel=new Set(due.map(c=>c.id));
  const sel=[...state.msgSel].filter(id=>due.some(c=>c.id===id));
  const TMPL=[
    {name:"そろそろご案内",body:"{name}様\n\nいつもご利用ありがとうございます。前回のご来店から少しお時間が空きましたので、そろそろメンテナンスのご案内です。ご都合のよい日はございますか？ご予約をお待ちしております。"},
    {name:"特典のご案内",body:"{name}様\n\nお久しぶりです。日頃の感謝を込めて、今月ご来店の方へちょっとした特典をご用意しました。この機会にぜひお待ちしております。"},
    {name:"シンプル",body:"{name}様\nお久しぶりです。またお会いできるのを楽しみにしています。ご予約はお気軽にどうぞ。"}
  ];
  const body=TMPL[state.tmpl].body;
  const recips=due.length?due.map(c=>{const on=state.msgSel.has(c.id);const ds=daysSince(lastVisit(c).date);
    return `<button class="recip ${on?'on':''}" data-rec="${c.id}"><span class="cb">${I.check}</span><img class="av" src="${av(c.name)}" alt=""><span style="flex:1;min-width:0"><span class="nm">${c.name} 様</span><div class="sub"><span class="num">${ds}</span>日経過</div></span></button>`;}).join("")
    :`<div class="empty" style="padding:36px 16px"><div class="eic">${I.chat}</div><div class="big">対象がいません</div></div>`;
  const first=due.find(c=>state.msgSel.has(c.id));
  const preview=(first?body.replace(/\{name\}/g,first.name):body.replace(/\{name\}/g,"お客様"));
  return `<div class="crumb"><a data-goto="rebook">再来店フォロー</a> › <b>メッセージを作成</b></div>
    <div class="pt">フォローメッセージ</div>
    <div class="msg-wrap">
      <div class="recips"><div class="rhh"><span>送信先 <span class="num">${sel.length}</span>／<span class="num">${due.length}</span>名</span><a id="sel-all">${sel.length===due.length&&due.length?"すべて解除":"すべて選択"}</a></div>${recips}</div>
      <div class="composer">
        <div class="seg"><button class="${state.channel==='line'?'on':''}" data-ch="line">LINE</button><button class="${state.channel==='sms'?'on':''}" data-ch="sms">SMS</button></div>
        <div class="sel" style="margin-bottom:11px;display:block"><select id="tmpl" style="width:100%">${TMPL.map((t,i)=>`<option value="${i}" ${i===state.tmpl?'selected':''}>テンプレート：${t.name}</option>`).join("")}</select></div>
        <textarea id="msg-body">${body}</textarea>
        <div class="hint"><code>{name}</code> は各お客様の名前に自動で置き換わります。</div>
        <div class="preview"><div class="pvh"><span>プレビュー（${state.channel==='line'?'LINE':'SMS'}）</span><span>${first?first.name+" 様":"—"}</span></div><div class="pvbody"><div class="bubble">${preview}</div></div></div>
        <div class="send-bar"><span class="scnt"><b>${sel.length}</b> 名に送信します</span><span style="flex:1"></span><button class="btn" id="send" ${sel.length?'':'disabled'}>${I.chat}送信する</button></div>
      </div></div>`;}

function viewAnalytics(){
  const mo=monthly();const maxC=Math.max(...mo.map(x=>x.count),1);const maxR=Math.max(...mo.map(x=>x.rev),1);
  const tm=thisMonth();const pop=popular();const maxP=Math.max(...pop.map(p=>p[1]),1);const rr=Math.round(repeatRate());
  const cur=mo.length-1;
  const barsC=mo.map((x,i)=>`<div class="bar ${i<cur-3?'dim':''}"><span class="val">${x.count}</span><div class="fill" style="height:${Math.max(Math.round(x.count/maxC*100),x.count?5:2)}%"></div></div>`).join("");
  const barsR=mo.map((x,i)=>`<div class="bar amber ${i<cur-3?'dim':''}"><span class="val">${x.rev?(Math.round(x.rev/1000)/10)+"万":"0"}</span><div class="fill" style="height:${Math.max(Math.round(x.rev/maxR*100),x.rev?5:2)}%"></div></div>`).join("");
  const caps=mo.map(x=>`<span>${x.label}</span>`).join("");
  const hb=pop.map((p,i)=>`<div class="hbar"><span class="rk">${i+1}</span><span class="hl">${p[0]}</span><div class="track"><div class="hf" style="width:${Math.round(p[1]/maxP*100)}%"></div></div><span class="hv">${p[1]}回</span></div>`).join("");
  const rpt=customers.filter(c=>c.visits.length>=2).length;
  return `<div class="pt">統計レポート</div>
    <div class="an-stats">
      <div class="scard"><span class="sic">${I.cal}</span><div><div class="k">今月の来店</div><div class="v num">${tm.visits}<small>件</small></div><div class="dl up">施術数の合計</div></div></div>
      <div class="scard"><span class="sic">${I.spark}</span><div><div class="k">今月の新規</div><div class="v num">${tm.neu}<small>名</small></div><div class="dl up">初回来店のお客様</div></div></div>
      <div class="scard warn"><span class="sic">${I.yen}</span><div><div class="k">今月の売上</div><div class="v num">${yen(tm.rev)}</div><div class="dl">施術金額の合計</div></div></div>
      <div class="scard"><span class="sic">${I.trend}</span><div><div class="k">リピート率</div><div class="v num">${repeatRate()}<small>%</small></div><div class="dl up">2回以上ご来店の割合</div></div></div>
    </div>
    <div class="charts">
      <div class="cc"><div class="ct">月別の来店数</div><div class="cs">直近6か月の推移</div><div class="bars">${barsC}</div><div class="caps">${caps}</div></div>
      <div class="cc"><div class="ct">月別の売上</div><div class="cs">直近6か月・施術金額ベース</div><div class="bars">${barsR}</div><div class="caps">${caps}</div></div>
      <div class="cc"><div class="ct">人気メニュー TOP5</div><div class="cs">来店回数の多い順</div><div class="hbars">${hb}</div></div>
      <div class="cc"><div class="ct">リピートの内訳</div><div class="cs">2回以上ご来店の割合</div>
        <div class="donut-wrap"><div class="donut" style="background:conic-gradient(var(--indigo) 0 ${rr}%, var(--line) ${rr}% 100%)"><div class="hole"><span class="pct">${rr}%</span><span class="pl">リピート</span></div></div>
          <div class="dl-legend"><span class="sw" style="background:var(--indigo)"></span>2回以上：<b>${rpt}</b> 名<br><span class="sw" style="background:var(--line-2)"></span>1回のみ：<b>${customers.length-rpt}</b> 名</div></div></div>
    </div>`;}

function plus(){return `<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>`;}
function mag(){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>`;}
function openModal(h){$("#modal").innerHTML=h;$("#ov").classList.add("show");}
function closeModal(){$("#ov").classList.remove("show");}

function bind(){
  const a=$("#add-cust");if(a)a.onclick=custModal;
  const q=$("#q");if(q)q.oninput=e=>{const p=e.target.selectionStart;state.query=e.target.value;render();const n=$("#q");if(n){n.focus();n.setSelectionRange(p,p);}};
  const f=$("#filter");if(f){f.value=state.filter;f.onchange=e=>{state.filter=e.target.value;render();};}
  document.querySelectorAll(".row").forEach(b=>b.onclick=()=>{state.selectedId=+b.dataset.id;state.view="detail";render();window.scrollTo(0,0);});
  const av2=$("#add-visit");if(av2)av2.onclick=visitModal;
  const am=$("#add-memo");if(am)am.onclick=memoModal;
  const aac=$("#add-appt-c");if(aac)aac.onclick=()=>apptModal(customers.find(x=>x.id===state.selectedId)?.name||"");
  document.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>{state.selectedId=+b.dataset.open;state.view="detail";render();window.scrollTo(0,0);});
  document.querySelectorAll("[data-done]").forEach(b=>b.onclick=e=>{e.stopPropagation();const c=customers.find(x=>x.id===+b.dataset.done);c.contactedAt=Date.now();toast(`${c.name}さんを「連絡済み」にしました`);render();});
  document.querySelectorAll("[data-goto]").forEach(b=>b.onclick=e=>{e.stopPropagation();state.view=b.dataset.goto;render();window.scrollTo(0,0);});
  document.querySelectorAll("[data-day]").forEach(b=>b.onclick=()=>{state.calSel=b.dataset.day;render();});
  document.querySelectorAll("[data-mv]").forEach(b=>b.onclick=()=>{const v=b.dataset.mv;
    if(v==="today"){const t=nowD();state.calY=t.getFullYear();state.calM=t.getMonth();state.calSel=iso(t);}
    else{let m=state.calM+(+v);let y=state.calY;if(m<0){m=11;y--;}if(m>11){m=0;y++;}state.calY=y;state.calM=m;}render();});
  const aa=$("#add-appt");if(aa)aa.onclick=()=>apptModal("");
  document.querySelectorAll("[data-rec]").forEach(b=>b.onclick=()=>{const id=+b.dataset.rec;state.msgSel.has(id)?state.msgSel.delete(id):state.msgSel.add(id);render();});
  const sa=$("#sel-all");if(sa)sa.onclick=()=>{const due=dueList();const all=due.every(c=>state.msgSel.has(c.id));state.msgSel=all?new Set():new Set(due.map(c=>c.id));render();};
  document.querySelectorAll("[data-ch]").forEach(b=>b.onclick=()=>{state.channel=b.dataset.ch;render();});
  const tm=$("#tmpl");if(tm)tm.onchange=e=>{state.tmpl=+e.target.value;render();};
  const send=$("#send");if(send)send.onclick=()=>{const due=dueList();const ids=[...state.msgSel].filter(id=>due.some(c=>c.id===id));
    ids.forEach(id=>{const c=customers.find(x=>x.id===id);if(c)c.contactedAt=Date.now();});state.msgSel=new Set();
    toast(`${ids.length}名に${state.channel==='line'?'LINE':'SMS'}を送信しました`);render();};
}
document.querySelectorAll(".nv").forEach(n=>n.onclick=()=>{state.view=n.dataset.view;render();window.scrollTo(0,0);});
$("#ov").onclick=e=>{if(e.target.id==="ov")closeModal();};

function custModal(){openModal(`<h3>顧客を追加</h3>
    <div class="fld"><label>お名前</label><input id="c-name" placeholder="例：中村 ゆい"></div>
    <div class="fld"><label>フリガナ（任意）</label><input id="c-kana" placeholder="例：ナカムラ ユイ"></div>
    <div class="frow"><div class="fld"><label>電話番号（任意）</label><input id="c-phone" placeholder="090-0000-0000"></div><div class="fld"><label>LINE ID（任意）</label><input id="c-line" placeholder="@yui_n"></div></div>
    <div class="mact"><button class="btn gray" onclick="closeModal()">キャンセル</button><button class="btn" id="c-save">追加する</button></div>`);
  $("#c-name").focus();$("#c-save").onclick=()=>{const name=$("#c-name").value.trim();if(!name){$("#c-name").focus();return;}
    customers.push({id:++uid,name,kana:$("#c-kana").value.trim(),phone:$("#c-phone").value.trim(),line:$("#c-line").value.trim(),age:"",note:"",memos:[],firstVisit:iso(nowD()),visits:[],contactedAt:null});
    closeModal();toast(`${name}さんを追加しました`);render();};}

function visitModal(){const c=customers.find(x=>x.id===state.selectedId);
  openModal(`<h3>来店を記録</h3>
    <div class="frow"><div class="fld"><label>来店日</label><input type="date" id="v-date" value="${iso(nowD())}"></div><div class="fld"><label>金額（円）</label><input id="v-price" inputmode="numeric" placeholder="8800"></div></div>
    <div class="fld"><label>施術メニュー</label><input id="v-menu" placeholder="例：ハンドジェル（ワンカラー）" list="menus">
      <datalist id="menus"><option>ハンドジェル（ワンカラー）</option><option>ハンドジェル（グラデーション）</option><option>フットジェル（定額デザイン）</option><option>まつげパーマ（上）</option><option>フェイシャル 60分</option><option>ヘッドスパ 60分</option></datalist></div>
    <div class="fld"><label>担当者</label><input id="v-staff" value="サロンドリコ"></div>
    <div class="fld"><label>申し送りメモ（次回への引き継ぎ）</label><textarea id="v-memo" placeholder="例：オフは丁寧に。次回は夏っぽい色を提案。"></textarea></div>
    <div class="mact"><button class="btn gray" onclick="closeModal()">キャンセル</button><button class="btn" id="v-save">記録する</button></div>`);
  $("#v-menu").focus();$("#v-save").onclick=()=>{const menu=$("#v-menu").value.trim();if(!menu){$("#v-menu").focus();return;}
    c.visits.push({date:$("#v-date").value||iso(nowD()),menu,staff:$("#v-staff").value.trim(),memo:$("#v-memo").value.trim(),price:parseInt(($("#v-price").value||"0").replace(/[^0-9]/g,""))||0});c.contactedAt=null;
    closeModal();toast("来店を記録しました");render();};}

function memoModal(){const c=customers.find(x=>x.id===state.selectedId);
  openModal(`<h3>お客様メモを追加</h3>
    <div class="fld"><label>メモ</label><input id="m-text" placeholder="例：コーヒーより紅茶が好き"></div>
    <div class="mact"><button class="btn gray" onclick="closeModal()">キャンセル</button><button class="btn" id="m-save">追加する</button></div>`);
  $("#m-text").focus();$("#m-save").onclick=()=>{const t=$("#m-text").value.trim();if(!t){$("#m-text").focus();return;}
    (c.memos=c.memos||[]).push(t);closeModal();toast("メモを追加しました");render();};}

function apptModal(prefill){const names=customers.map(c=>`<option>${c.name}</option>`).join("");
  openModal(`<h3>予約を追加</h3>
    <div class="frow"><div class="fld"><label>日付</label><input type="date" id="a-date" value="${state.calSel}"></div><div class="fld"><label>時間</label><input type="time" id="a-time" value="11:00"></div></div>
    <div class="fld"><label>お客様</label><input id="a-cust" placeholder="お名前" list="cnames" value="${prefill||""}"><datalist id="cnames">${names}</datalist></div>
    <div class="fld"><label>メニュー</label><input id="a-menu" placeholder="例：ハンドジェル（ワンカラー）"></div>
    <div class="mact"><button class="btn gray" onclick="closeModal()">キャンセル</button><button class="btn" id="a-save">追加する</button></div>`);
  (prefill?$("#a-menu"):$("#a-cust")).focus();
  $("#a-save").onclick=()=>{const cust=$("#a-cust").value.trim(),menu=$("#a-menu").value.trim();if(!cust||!menu){($("#a-cust").value?$("#a-menu"):$("#a-cust")).focus();return;}
    const date=$("#a-date").value||state.calSel;appts.push({id:++uid,date,time:$("#a-time").value||"11:00",cust,menu,staff:"サロンドリコ"});
    closeModal();toast("予約を追加しました");render();};}

render();
</script>
</body>
</html>
